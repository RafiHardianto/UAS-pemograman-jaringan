<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}UAS Pemrograman Jaringan{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  {% if session.get('user_id') %}
  <nav class="navbar">
    <span class="brand">NetApp</span>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('upload') }}">Upload (TCP)</a>
      <a href="{{ url_for('stream') }}">Streaming (UDP)</a>
      <a href="{{ url_for('logout') }}">Logout ({{ session['username'] }})</a>
    </div>
  </nav>
  {% endif %}

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
